services:
  trading:
    build:
      context: .
      dockerfile: Dockerfile
    image: ticaret-engine
    container_name: trading-engine
    command: ["paper-trade", "--strategy", "sma_crossover", "--symbols", "BTC/USDT", "--config", "/app/configs/docker.yaml"]
    ports:
      - "9123:8000"
    environment:
      - TRADING_REDIS__HOST=redis
      - TRADING_DATABASE__HOST=timescaledb
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/metrics', timeout=3).raise_for_status()"]
      start_period: 15s
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  sentiment-ingester:
    image: ticaret-engine
    container_name: trading-sentiment
    command: ["sentiment-ingest", "--config", "/app/configs/docker.yaml"]
    environment:
      - TRADING_REDIS__HOST=redis
      - TRADING_DATABASE__HOST=timescaledb
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: trading-redis
    ports:
      - "9124:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:2.15.0-pg16
    container_name: trading-timescaledb
    ports:
      - "9125:5432"
    environment:
      POSTGRES_DB: trading
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading_dev
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d trading"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  prometheus:
    image: quay.io/prometheus/prometheus:v3.11.3-distroless
    container_name: trading-prometheus
    ports:
      - "9126:9090"
    volumes:
      - ./grafana/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    healthcheck:
      test: ["CMD", "/bin/promtool", "check", "web-health", "--web.health-check-url=http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: trading-grafana
    ports:
      - "9127:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  test-runner:
    profiles:
      - test
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: trading-test
    environment:
      - TRADING_REDIS__HOST=redis
      - TRADING_DATABASE__HOST=timescaledb
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy

volumes:
  timescaledb_data:
